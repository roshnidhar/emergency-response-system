spring:
  application:
    name: emergency-response-system

  datasource:
    url: jdbc:postgresql://localhost:5432/emergency_db
    username: ${DB_USERNAME:emergency}
    password: ${DB_PASSWORD:emergency123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # use 'validate' in prod with Flyway migrations
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes default TTL

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-must-be-256-bits-long}
    expiration-ms: 86400000   # 24h

  routing:
    osrm-base-url: http://router.project-osrm.org   # free public OSRM
    max-ambulance-search-radius-km: 50

  websocket:
    location-broadcast-interval-ms: 3000

logging:
  level:
    com.emergency: DEBUG
    org.springframework.web.socket: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
